<!DOCTYPE html>
<html lang="en">
<body style="font-family: Arial, sans-serif; color: #1a1a1a; max-width: 600px;">
  <h1 style="color: #2d6a4f;">Weekly operational brief</h1>
  <p>{{ org_name }} · {{ generated_at }}</p>
  <p style="font-size: 24px;"><strong>{{ health_score }}</strong> / 100 — {{ health_status }}</p>

  <h2>Top findings</h2>
  {% for f in findings %}
  <div style="margin-bottom: 16px; padding: 12px; border: 1px solid #eee; border-radius: 8px;">
    <p style="margin: 0; font-size: 12px; color: #666;">{{ f.severity }}</p>
    <p style="margin: 4px 0;"><strong>{{ f.title }}</strong></p>
    <p style="margin: 0;">{{ f.detail }}</p>
  </div>
  {% endfor %}

  <p><a href="{{ report_url }}">View full report in Ribet</a></p>
  <p style="font-size: 11px; color: #888;">Generated by Ribet</p>
</body>
</html>
