# Default service config when Railway builds from repo root (API).
# Worker: duplicate service, Root Directory api/, start python -m app.worker.process_job
# Web: separate service, Root Directory web/

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["api/**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
